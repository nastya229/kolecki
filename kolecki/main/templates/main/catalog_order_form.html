{% extends "main/base.html" %}

{% block title %}Оформление заказа{% endblock %}

{% block content %}
<div class="success-box">
  <h1>Оформление заказа</h1>
  <p>Украшение: <b>{{ jewelry.name }}</b></p>
  <p>Оставьте имя и телефон — мы свяжемся с вами.</p>

  <form method="post" style="display:flex; flex-direction:column; gap:12px; margin-top:20px;">
    {% csrf_token %}

    <input
      type="text"
      name="customer_name"
      placeholder="Ваше имя"
      required
      style="padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:#fff;"
    >

    <input
      type="text"
      name="phone"
      placeholder="Ваш номер телефона"
      required
      style="padding:12px 14px; border-radius:12px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.04); color:#fff;"
    >

    <button type="submit" class="btn btn-primary">Отправить заказ</button>
  </form>
</div>
{% endblock %}
